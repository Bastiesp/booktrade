<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BookSwipe Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:#FFF7ED;color:#111827}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #FED7AA;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
h1{font-size:22px;margin:0;color:#F97316}.wrap{max-width:1180px;margin:0 auto;padding:20px}
.card{background:#fff;border:1px solid #FED7AA;border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(17,24,39,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.stat{background:#fff;border:1px solid #FED7AA;border-radius:16px;padding:16px}.stat b{font-size:28px;color:#F97316}.stat span{display:block;color:#6B7280;font-size:12px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tabs button,.btn{border:0;background:#F97316;color:#fff;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.tabs button.secondary,.btn.secondary{background:#fff;color:#6B7280;border:1px solid #FED7AA}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #FED7AA;text-align:left;font-size:13px;vertical-align:top}th{background:#FFF7ED;color:#6B7280;font-size:11px;text-transform:uppercase}
img.avatar{width:54px;height:54px;object-fit:cover;border-radius:50%;border:2px solid #FED7AA}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;background:#FFF7ED;color:#F97316;border:1px solid #FED7AA}
.login{max-width:420px;margin:80px auto}.input{width:100%;border:1px solid #FED7AA;border-radius:12px;padding:12px;margin:8px 0;font-size:14px}.muted{color:#6B7280;font-size:13px}.actions{display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>
<header><h1>BookSwipe Admin</h1><button class="btn secondary" onclick="logout()">Cerrar sesión</button></header>
<div class="wrap">
  <div id="login" class="login card">
    <h2>Ingresar como admin</h2>
    <p class="muted">Usa una cuenta marcada como admin o un email configurado en ADMIN_EMAILS.</p>
    <input id="id" class="input" placeholder="Correo o usuario"/>
    <input id="pw" class="input" type="password" placeholder="Contraseña"/>
    <button class="btn" onclick="login()">Ingresar</button>
    <p id="err" class="muted"></p>
  </div>

  <div id="panel" style="display:none">
    <div id="stats" class="grid"></div>
    <div class="tabs">
      <button onclick="loadVerifications()">Verificaciones</button>
      <button onclick="loadUsers()">Usuarios</button>
      <button onclick="loadBooks()">Libros</button>
      <button onclick="loadExchanges()">Intercambios</button>
      <button class="secondary" onclick="refreshAll()">Actualizar</button>
    </div>
    <div id="content" class="card">Cargando...</div>
  </div>
</div>
<script>
const API='';
let TOKEN=localStorage.getItem('bs_token')||'';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function api(method,path,body){
 const h={'Content-Type':'application/json'}; if(TOKEN)h.Authorization='Bearer '+TOKEN;
 const r=await fetch(API+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
 const d=await r.json().catch(()=>({})); if(!r.ok)throw new Error(d.error||'Error '+r.status); return d;
}
async function login(){
 try{const d=await api('POST','/api/auth/login',{identifier:$('id').value.trim(),password:$('pw').value});TOKEN=d.token;localStorage.setItem('bs_token',TOKEN);await refreshAll();}
 catch(e){$('err').textContent=e.message}
}
function logout(){localStorage.removeItem('bs_token');TOKEN='';$('login').style.display='block';$('panel').style.display='none'}
async function refreshAll(){try{$('login').style.display='none';$('panel').style.display='block';await loadSummary();await loadVerifications();}catch(e){$('login').style.display='block';$('panel').style.display='none';$('err').textContent=e.message}}
async function loadSummary(){
 const s=await api('GET','/api/admin/summary');
 $('stats').innerHTML=Object.entries({Usuarios:s.users,Libros:s.books,'Libros activos':s.activeBooks,'Intercambios completos':s.exchangesCompleted,'Intercambios pendientes':s.exchangesPending,Mensajes:s.messages,'Fotos pendientes':s.pendingVerifications,'Notificaciones unread':s.unreadNotifications}).map(([k,v])=>`<div class="stat"><b>${v}</b><span>${k}</span></div>`).join('');
}
async function loadVerifications(){
 const rows=await api('GET','/api/admin/verifications');
 $('content').innerHTML='<h2>Fotos pendientes</h2>'+(!rows.length?'<p class="muted">No hay verificaciones pendientes.</p>':`<table><tr><th>Foto</th><th>Usuario</th><th>Datos</th><th>Acciones</th></tr>${rows.map(u=>`<tr><td>${u.profilePhoto?`<img class="avatar" src="${u.profilePhoto}">`:''}</td><td><b>@${esc(u.username)}</b><br>${esc(u.email)}</td><td>${esc(u.location||'Sin comuna')}<br><span class="pill">${esc(u.level||'Aficionado')}</span> ${u.completedExchanges||0} intercambios</td><td class="actions"><button class="btn" onclick="verify('${u._id}','verified')">Aprobar</button><button class="btn secondary" onclick="verify('${u._id}','rejected')">Rechazar</button></td></tr>`).join('')}</table>`);
}
async function verify(id,status){await api('PUT','/api/admin/users/'+id+'/verification',{status});await loadSummary();await loadVerifications();}
async function loadUsers(){
 const rows=await api('GET','/api/admin/users');
 $('content').innerHTML=`<h2>Usuarios</h2><table><tr><th>Foto</th><th>Usuario</th><th>Perfil público</th><th>Estado</th><th>Rol</th></tr>${rows.map(u=>`<tr><td>${u.profilePhoto?`<img class="avatar" src="${u.profilePhoto}">`:''}</td><td><b>@${esc(u.username)}</b><br>${esc(u.email)}</td><td>${esc(u.location||'Sin comuna')}<br>${u.totalBooks||0} libros · ${u.completedExchanges||0} intercambios<br>⭐ ${(u.ratingAvg||0).toFixed?u.ratingAvg.toFixed(1):u.ratingAvg||0} (${u.ratingCount||0})</td><td><span class="pill">${esc(u.verificationStatus)}</span> <span class="pill">${esc(u.level)}</span></td><td>${esc(u.role||'user')}<br><button class="btn secondary" onclick="role('${u._id}','${u.role==='admin'?'user':'admin'}')">${u.role==='admin'?'Quitar admin':'Hacer admin'}</button></td></tr>`).join('')}</table>`;
}
async function role(id,role){await api('PUT','/api/admin/users/'+id+'/role',{role});loadUsers();}
async function loadBooks(){
 const rows=await api('GET','/api/admin/books');
 $('content').innerHTML=`<h2>Libros</h2><table><tr><th>Foto</th><th>Libro</th><th>Dueño</th><th>Estado</th><th>Acción</th></tr>${rows.map(b=>`<tr><td>${b.photos?.[0]?`<img style="width:52px;height:70px;object-fit:cover;border-radius:8px" src="${b.photos[0]}">`:''}</td><td><b>${esc(b.title)}</b><br>${esc(b.author)}</td><td>@${esc(b.owner?.username||'—')}<br>${esc(b.owner?.location||'')}</td><td><span class="pill">${b.available?'Activo':'No disponible'}</span></td><td><button class="btn secondary" onclick="delBook('${b._id}')">Eliminar</button></td></tr>`).join('')}</table>`;
}
async function delBook(id){if(confirm('¿Eliminar libro?')){await api('DELETE','/api/admin/books/'+id);loadBooks();loadSummary();}}
async function loadExchanges(){
 const rows=await api('GET','/api/admin/exchanges');
 $('content').innerHTML=`<h2>Intercambios</h2><table><tr><th>Usuarios</th><th>Libros</th><th>Estado</th><th>Confirmaciones</th></tr>${rows.map(x=>`<tr><td>${(x.participants||[]).map(u=>'@'+esc(u.username)).join('<br>')}</td><td>${esc(x.myBook?.title||'—')} ⇄ ${esc(x.theirBook?.title||'—')}</td><td><span class="pill">${esc(x.status)}</span><br>${x.completedAt?new Date(x.completedAt).toLocaleString('es-CL'):''}</td><td>${(x.confirmations||[]).length}/2</td></tr>`).join('')}</table>`;
}
if(TOKEN)refreshAll();
</script>
</body>
</html>
