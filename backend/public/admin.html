<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>BookTrade Admin Pro</title><style>body{margin:0;background:#F8FAFC;color:#111827;font-family:Arial,sans-serif}header{position:sticky;top:0;background:#fff;border-bottom:1px solid #BFDBFE;padding:14px 22px;display:flex;justify-content:space-between}h1{margin:0;color:#2563EB}.wrap{max-width:1280px;margin:0 auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.stat,.card{background:#fff;border:1px solid #BFDBFE;border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.04)}.stat b{font-size:28px;color:#2563EB}.stat span{display:block;font-size:12px;color:#64748B}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.btn,.tabs button{border:0;border-radius:999px;background:#3B82F6;color:#fff;padding:10px 14px;font-weight:900;cursor:pointer}.secondary{background:#fff!important;color:#475569!important;border:1px solid #BFDBFE!important}.danger{background:#991B1B!important}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #DBEAFE;text-align:left;font-size:13px;vertical-align:top}th{background:#EFF6FF;color:#475569;font-size:11px;text-transform:uppercase}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;font-size:11px;font-weight:900}.input{border:1px solid #BFDBFE;border-radius:12px;padding:11px 12px;min-width:260px}.login{max-width:440px;margin:70px auto}.avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid #BFDBFE}pre{white-space:pre-wrap;background:#0F172A;color:#fff;border-radius:12px;padding:12px;font-size:12px}</style></head><body><header><h1>BookTrade Admin Pro</h1><button class="btn secondary" onclick="logout()">Cerrar sesión</button></header><div class="wrap"><div id="login" class="login card"><h2>Acceso administrador</h2><input id="id" class="input" placeholder="Correo o usuario" style="width:100%;margin-bottom:8px"><input id="pw" type="password" class="input" placeholder="Contraseña" style="width:100%;margin-bottom:12px"><button class="btn" onclick="login()">Entrar</button><div id="err"></div></div><div id="panel" style="display:none"><div id="who" class="card" style="margin-bottom:14px"></div><div id="stats" class="grid"></div><div class="tabs"><button onclick="loadUsers()">Usuarios</button><button onclick="loadBooks()">Libros</button><button onclick="loadExchanges('all')">Intercambios</button><button onclick="loadExchanges('completed')">Intercambiados</button><button onclick="loadExchanges('pending')">En proceso / Match</button><button onclick="loadReports()">Reportes</button><button onclick="loadVerifications()">Fotos</button><button onclick="loadActions()">Historial admin</button><button class="secondary" onclick="refresh()">Actualizar KPIs</button></div><div id="content" class="card"></div></div></div><script>
let TOKEN=localStorage.getItem('bs_token')||'';const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function api(method,path,body){const h={'Content-Type':'application/json'};if(TOKEN)h.Authorization='Bearer '+TOKEN;const r=await fetch(path,{method,headers:h,body:body?JSON.stringify(body):undefined});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Error '+r.status);return d}function msg(e){$('err').innerHTML='<pre>'+esc(e.message||e)+'</pre>'}
async function login(){try{const d=await api('POST','/api/auth/login',{identifier:$('id').value.trim(),password:$('pw').value});TOKEN=d.token;localStorage.setItem('bs_token',TOKEN);await refresh()}catch(e){msg(e)}}function logout(){localStorage.removeItem('bs_token');TOKEN='';$('login').style.display='block';$('panel').style.display='none'}
async function refresh(){try{const w=await api('GET','/api/admin/whoami');if(!w.isAdmin)throw new Error('Tu usuario no tiene permiso admin');$('login').style.display='none';$('panel').style.display='block';$('who').innerHTML='<b>Admin:</b> '+esc(w.user.email)+' · rol '+esc(w.user.role);await summary();await loadUsers()}catch(e){$('login').style.display='block';$('panel').style.display='none';msg(e)}}
async function summary(){const s=await api('GET','/api/admin/summary');$('stats').innerHTML=Object.entries({'Usuarios':s.users,'Admins':s.admins,'Bloqueados':s.blocked,'Eliminados':s.deleted,'Libros':s.books,'Libros activos':s.activeBooks,'Intercambiados':s.completed,'En proceso':s.pending,'Mensajes':s.messages,'Reportes abiertos':s.reportsOpen,'Fotos pendientes':s.pendingVerifications,'Nuevos este mes':s.newUsersMonth}).map(([k,v])=>`<div class="stat"><b>${v||0}</b><span>${k}</span></div>`).join('')}
function searchBox(fn,ph){return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><input id="q" class="input" placeholder="${ph}" onkeydown="if(event.key==='Enter')${fn}()"><button class="btn" onclick="${fn}()">Buscar</button></div>`}
async function loadUsers(){const q=$('q')?.value||'';const rows=await api('GET','/api/admin/users?q='+encodeURIComponent(q));$('content').innerHTML='<h2>Usuarios</h2>'+searchBox('loadUsers','Buscar usuario, email o comuna')+`<table><tr><th>Usuario</th><th>Datos</th><th>Rol/Estado</th><th>Actividad</th><th>Creación</th><th>Acciones</th></tr>${rows.map(u=>`<tr><td>${u.profilePhoto?`<img class="avatar" src="${u.profilePhoto}">`:''}<br><b>@${esc(u.username)}</b><br>${esc(u.email)}</td><td>${esc(u.location||'Sin comuna')}<br>⭐ ${Number(u.ratingAvg||0).toFixed(1)} (${u.ratingCount||0})<br>${esc(u.verificationStatus||'pending')}</td><td><span class="pill">${esc(u.role||'user')}</span><br><span class="pill">${esc(u.accountStatus||'active')}</span></td><td>${u.totalBooks||0} libros<br>${u.completedExchanges||0} intercambios<br>${esc(u.level||'Aficionado')}</td><td>${new Date(u.createdAt).toLocaleString('es-CL')}</td><td><button class="btn secondary" onclick="role('${u._id}','${u.role==='admin'?'user':'admin'}')">${u.role==='admin'?'Quitar admin':'Hacer admin'}</button> <button class="btn secondary" onclick="statusUser('${u._id}','${u.accountStatus==='blocked'?'active':'blocked'}')">${u.accountStatus==='blocked'?'Activar':'Bloquear'}</button> <button class="btn danger" onclick="deleteUser('${u._id}')">Eliminar</button></td></tr>`).join('')}</table>`}
async function role(id,role){await api('PUT','/api/admin/users/'+id+'/role',{role});loadUsers();summary()}async function statusUser(id,status){await api('PUT','/api/admin/users/'+id+'/status',{status});loadUsers();summary()}async function deleteUser(id){if(confirm('¿Eliminar usuario?')){await api('DELETE','/api/admin/users/'+id);loadUsers();summary()}}
async function loadBooks(){const q=$('q')?.value||'';const rows=await api('GET','/api/admin/books?q='+encodeURIComponent(q));$('content').innerHTML='<h2>Libros</h2>'+searchBox('loadBooks','Buscar título, autor o género')+`<table><tr><th>Libro</th><th>Dueño</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr>${rows.map(b=>`<tr><td>${b.photos?.[0]?`<img style="width:50px;height:68px;object-fit:cover;border-radius:8px" src="${b.photos[0]}">`:''}<br><b>${esc(b.title)}</b><br>${esc(b.author)} · ${esc(b.genre)}</td><td>@${esc(b.owner?.username||'—')}<br>${esc(b.owner?.email||'')}</td><td><span class="pill">${b.available?'Activo':'Intercambiado/no disponible'}</span></td><td>${new Date(b.createdAt).toLocaleString('es-CL')}</td><td><button class="btn danger" onclick="delBook('${b._id}')">Eliminar libro</button></td></tr>`).join('')}</table>`}
async function delBook(id){if(confirm('¿Eliminar libro?')){await api('DELETE','/api/admin/books/'+id);loadBooks();summary()}}
async function loadExchanges(status){const rows=await api('GET','/api/admin/exchanges?status='+status);$('content').innerHTML=`<h2>Intercambios: ${status}</h2><table><tr><th>Usuarios</th><th>Libros</th><th>Estado</th><th>Confirmaciones</th><th>Actualizado</th></tr>${rows.map(x=>`<tr><td>${(x.participants||[]).map(u=>'@'+esc(u.username)+'<br>'+esc(u.email)).join('<hr>')}</td><td>${esc(x.myBook?.title||'—')} ⇄ ${esc(x.theirBook?.title||'—')}</td><td><span class="pill">${esc(x.status)}</span></td><td>${(x.confirmations||[]).length}/2</td><td>${new Date(x.updatedAt).toLocaleString('es-CL')}</td></tr>`).join('')}</table>`}
async function loadReports(){const rows=await api('GET','/api/admin/reports');$('content').innerHTML=`<h2>Reportes</h2><table><tr><th>Reporta</th><th>Reportado/libro</th><th>Motivo</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr>${rows.map(r=>`<tr><td>@${esc(r.reporter?.username||'—')}<br>${esc(r.reporter?.email||'')}</td><td>${r.reportedUser?'@'+esc(r.reportedUser.username):''}${r.book?'<br>📘 '+esc(r.book.title):''}</td><td>${esc(r.reason)}</td><td><span class="pill">${esc(r.status)}</span></td><td>${new Date(r.createdAt).toLocaleString('es-CL')}</td><td><button class="btn secondary" onclick="reportStatus('${r._id}','reviewing')">Revisando</button><button class="btn secondary" onclick="reportStatus('${r._id}','resolved')">Resuelto</button><button class="btn secondary" onclick="reportStatus('${r._id}','dismissed')">Descartar</button></td></tr>`).join('')}</table>`}
async function reportStatus(id,status){await api('PUT','/api/admin/reports/'+id,{status});loadReports();summary()}async function loadVerifications(){const rows=await api('GET','/api/admin/verifications');$('content').innerHTML=`<h2>Fotos pendientes</h2><table><tr><th>Foto</th><th>Usuario</th><th>Acción</th></tr>${rows.map(u=>`<tr><td>${u.profilePhoto?`<img class="avatar" src="${u.profilePhoto}">`:''}</td><td>@${esc(u.username)}<br>${esc(u.email)}</td><td><button class="btn" onclick="verify('${u._id}','verified')">Aprobar</button><button class="btn secondary" onclick="verify('${u._id}','rejected')">Rechazar</button></td></tr>`).join('')}</table>`}
async function verify(id,status){await api('PUT','/api/admin/users/'+id+'/verification',{status});loadVerifications();summary()}async function loadActions(){const rows=await api('GET','/api/admin/actions');$('content').innerHTML=`<h2>Historial acciones admin</h2><table><tr><th>Admin</th><th>Acción</th><th>Target</th><th>Detalle</th><th>Fecha</th></tr>${rows.map(a=>`<tr><td>@${esc(a.admin?.username||'—')}<br>${esc(a.admin?.email||'')}</td><td><span class="pill">${esc(a.action)}</span></td><td>${esc(a.targetType)}<br>${esc(a.targetId)}</td><td><pre>${esc(JSON.stringify(a.detail||{},null,2))}</pre></td><td>${new Date(a.createdAt).toLocaleString('es-CL')}</td></tr>`).join('')}</table>`}
if(TOKEN)refresh();</script></body></html>
