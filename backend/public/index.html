<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><meta name="theme-color" content="#FFFFFF"/><title>BookTrade</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/><style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;background:#FFFFFF;font-family:'DM Sans',sans-serif;color:#111827;overflow:hidden}
#app{position:fixed;inset:0;width:100%;max-width:1180px;margin:0 auto;overflow:hidden;background:#FFFFFF;height:100vh}
#view{position:absolute;top:0;left:96px;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:#FFFFFF}#view::-webkit-scrollbar{display:none}
#nav{position:fixed!important;top:0!important;bottom:auto!important;left:max(0px,calc(50% - 590px))!important;transform:none!important;width:96px!important;max-width:96px!important;height:100vh!important;background:#FFFFFF!important;border-right:1px solid #BFDBFE!important;border-top:none!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;gap:4px!important;padding:10px 8px!important;z-index:999999!important;box-shadow:8px 0 24px rgba(17,24,39,.06)!important}
.nb{width:100%;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:none;background:transparent;cursor:pointer;color:#9CA3AF;font-size:11px;font-weight:700;font-family:inherit;transition:color .2s,transform .2s,background .2s;padding:8px 4px;border-radius:16px;position:relative}.nb.active{color:#3B82F6;background:#EFF6FF;font-weight:900}.nb svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#nb-notif-badge{position:absolute;top:7px;right:14px;background:#EF4444;color:#fff;border-radius:999px;min-width:17px;height:17px;display:none;align-items:center;justify-content:center;font-size:9px;font-weight:900;border:2px solid #fff}
.spin{width:32px;height:32px;border:3px solid #BFDBFE;border-top-color:#3B82F6;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes matchPop{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}input,textarea,select,button{font-family:'DM Sans',sans-serif}button{cursor:pointer}a{text-decoration:none}
@media(max-width:720px){#app{max-width:100%}#view{left:78px}#nav{left:0!important;width:78px!important;max-width:78px!important;padding:8px 5px!important}.nb{min-height:58px;font-size:9px;border-radius:14px}.nb svg{width:21px;height:21px}}
</style></head><body><div id="app"><div id="view"></div></div><div id="nav">
<button class="nb" id="nb-discover" onclick="window.showDiscover?showDiscover():alert('app.js todavía no cargó')"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span>Explorar</span></button>
<button class="nb" id="nb-books" onclick="window.showBooks?showBooks():alert('app.js todavía no cargó')"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></svg><span>Libros</span></button>
<button class="nb" id="nb-matches" onclick="window.showMatches?showMatches():alert('app.js todavía no cargó')"><span id="nb-notif-badge">0</span><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span id="nb-mlabel">Matches</span></button>
<button class="nb" id="nb-chats" onclick="window.showChats?showChats():alert('app.js todavía no cargó')"><svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg><span>Chats</span></button>
<button class="nb" id="nb-history" onclick="window.showHistory?showHistory():alert('app.js todavía no cargó')"><svg viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 2"/></svg><span>Historial</span></button>
<button class="nb" id="nb-profile" onclick="window.showProfile?showProfile():alert('app.js todavía no cargó')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Perfil</span></button>
</div><div id="toasts" style="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:340px;width:90%"></div>
<script>window.__BOOKTRADE_VERSION__="admin-wide-final-v1";setInterval(function(){var nav=document.getElementById('nav'),view=document.getElementById('view'),app=document.getElementById('app'),small=window.innerWidth<=720;if(app){app.style.setProperty('max-width','1180px','important');app.style.setProperty('width','100%','important')}if(nav&&!window.__CHAT_OPEN__){nav.style.setProperty('display','flex','important');nav.style.setProperty('z-index','999999','important');nav.style.setProperty('flex-direction','column','important')}if(view){view.style.setProperty('bottom','0','important');view.style.setProperty('left',small?'78px':'96px','important')}},500);</script><script src="/socket.io/socket.io.js"></script><script>if(typeof io==='undefined'){document.write('<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"><\/script>')}</script><script src="./app.js?v=reset-visible-v2"></script></body></html>
