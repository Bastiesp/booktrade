<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Restablecer contraseña — BookTrade</title><style>body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:#EFF6FF;color:#111827;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:430px;background:#fff;border:1px solid #BFDBFE;border-radius:24px;padding:28px;box-shadow:0 24px 70px rgba(17,24,39,.12)}input,button{width:100%;padding:14px;border-radius:12px;font-size:15px;margin-bottom:12px}input{background:#EFF6FF;border:1px solid #BFDBFE}button{background:#3B82F6;color:#fff;border:0;font-weight:900}.msg{font-size:14px}.ok{color:#166534}.err{color:#991B1B}a{display:block;text-align:center;margin-top:14px;color:#3B82F6;font-weight:800;text-decoration:none}</style></head><body><div class="card"><h1>Nueva contraseña</h1><p>Crea una nueva contraseña para BookTrade.</p><input id="p1" type="password" placeholder="Nueva contraseña"/><input id="p2" type="password" placeholder="Repetir contraseña"/><button id="btn" onclick="resetPassword()">Guardar contraseña</button><div id="msg" class="msg"></div><a href="/">Volver al login</a></div><script>const token=new URLSearchParams(location.search).get('token')||'';function msg(t,ok){document.getElementById('msg').className='msg '+(ok?'ok':'err');document.getElementById('msg').textContent=t}async function resetPassword(){const p1=document.getElementById('p1').value,p2=document.getElementById('p2').value,btn=document.getElementById('btn');if(!token)return msg('El enlace no tiene token o es inválido.',false);if(!p1||p1.length<6)return msg('La contraseña debe tener al menos 6 caracteres.',false);if(p1!==p2)return msg('Las contraseñas no coinciden.',false);btn.disabled=true;btn.textContent='Guardando...';try{const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:p1})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'No se pudo cambiar la contraseña');msg('Contraseña actualizada correctamente. Ya puedes iniciar sesión.',true);setTimeout(()=>location.href='/',1800)}catch(e){msg(e.message,false)}finally{btn.disabled=false;btn.textContent='Guardar contraseña'}}</script></body></html>
