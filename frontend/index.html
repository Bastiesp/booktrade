<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0906" />
  <title>BookSwipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Variables ────────────────────────────────── */
    :root {
      --bg:        #0D0906;
      --surface:   #1A1210;
      --card:      #231815;
      --card-2:    #2A1E19;
      --border:    #3A2820;
      --border-2:  #4A3428;
      --text:      #F0E4CD;
      --text-2:    #A08070;
      --text-3:    #604840;
      --gold:      #D4A843;
      --gold-2:    #B8862A;
      --like:      #4CAF7D;
      --nope:      #D45A4A;
      --nav-h:     68px;
      --r:         14px;
      --r-lg:      22px;
    }

    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'DM Sans', sans-serif; color: var(--text); }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, textarea, select { font-family: inherit; }
    img { display: block; }

    /* ─── App Shell ─────────────────────────────────── */
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ─── Auth View ─────────────────────────────────── */
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .auth-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 20%, rgba(212,168,67,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .auth-logo-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(212,168,67,.4));
    }
    .auth-logo-title {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
    }
    .auth-logo-title span { color: var(--gold); }
    .auth-logo-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 6px;
      letter-spacing: .5px;
    }
    .auth-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px 24px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      text-align: center;
      transition: all .2s;
    }
    .auth-tab.active {
      background: var(--gold);
      color: #0D0906;
      font-weight: 600;
    }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; letter-spacing: .3px; text-transform: uppercase; }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--text-3); }
    .form-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      appearance: none;
      transition: border-color .2s;
    }
    .form-select:focus { border-color: var(--gold); }
    .form-select option { background: var(--card); }
    .form-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      resize: none;
      transition: border-color .2s;
      line-height: 1.5;
    }
    .form-textarea:focus { border-color: var(--gold); }
    .form-textarea::placeholder { color: var(--text-3); }
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: #0D0906;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .3px;
      transition: all .2s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--gold-2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; pointer-events: none; }
    .btn-secondary {
      padding: 12px 20px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-2);
      transition: all .2s;
    }
    .btn-secondary:hover { border-color: var(--border-2); color: var(--text); }
    .btn-danger {
      padding: 10px 16px;
      background: rgba(212,90,74,.15);
      border: 1px solid rgba(212,90,74,.3);
      border-radius: 10px;
      font-size: 13px;
      color: var(--nope);
      transition: all .2s;
    }
    .btn-danger:hover { background: rgba(212,90,74,.25); }

    /* ─── App Views ─────────────────────────────────── */
    .view {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: var(--nav-h);
      scrollbar-width: none;
    }
    .view::-webkit-scrollbar { display: none; }

    /* ─── Top Bar ────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.5px;
    }
    .topbar-title span { color: var(--gold); }
    .topbar-badge {
      background: var(--gold);
      color: #0D0906;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ─── Discover / Card Stack ──────────────────────── */
    .discover-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 16px;
      height: calc(100vh - var(--nav-h) - 60px);
    }
    .card-stack {
      position: relative;
      width: 100%;
      flex: 1;
      max-height: 520px;
      min-height: 380px;
    }
    .book-card {
      position: absolute;
      inset: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transform-origin: center bottom;
      user-select: none;
      will-change: transform;
    }
    .book-card:nth-child(1) { z-index: 3; }
    .book-card:nth-child(2) { z-index: 2; transform: scale(.96) translateY(14px) rotate(1.5deg); }
    .book-card:nth-child(3) { z-index: 1; transform: scale(.92) translateY(28px) rotate(-1deg); }
    .book-card.draggable { cursor: grab; }
    .book-card.draggable:active { cursor: grabbing; }
    .card-cover {
      width: 100%;
      height: 62%;
      position: relative;
      overflow: hidden;
      background: #3A2820;
    }
    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card-cover-placeholder-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .card-cover-placeholder-author {
      font-size: 13px;
      color: rgba(255,255,255,.6);
      font-style: italic;
    }
    .card-cover-placeholder-deco {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      top: -30px; right: -30px;
    }
    .card-info {
      padding: 16px 18px;
    }
    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-author {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 10px;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .3px;
    }
    .chip-genre { background: rgba(212,168,67,.12); color: var(--gold); border: 1px solid rgba(212,168,67,.2); }
    .chip-cond  { background: rgba(240,228,205,.06); color: var(--text-2); border: 1px solid var(--border); }
    .card-owner {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    /* LIKE / NOPE stamps */
    .stamp {
      position: absolute;
      top: 28px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      border-width: 3px;
      border-style: solid;
      transition: none;
      z-index: 10;
    }
    .stamp-like { left: 20px; color: var(--like); border-color: var(--like); transform: rotate(-15deg); }
    .stamp-nope { right: 20px; color: var(--nope); border-color: var(--nope); transform: rotate(15deg); }

    /* Action buttons */
    .action-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 20px;
      flex-shrink: 0;
    }
    .action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .action-btn-nope {
      background: var(--card);
      border: 2px solid var(--nope);
      color: var(--nope);
      font-size: 26px;
    }
    .action-btn-nope:hover { background: rgba(212,90,74,.1); transform: scale(1.08); }
    .action-btn-like {
      width: 72px;
      height: 72px;
      background: var(--gold);
      border: none;
      color: #0D0906;
      font-size: 30px;
    }
    .action-btn-like:hover { background: var(--gold-2); transform: scale(1.08); }
    .action-btn:active { transform: scale(.96) !important; }

    /* Empty / loading states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
      padding: 32px;
      gap: 12px;
    }
    .empty-icon { font-size: 56px; opacity: .5; }
    .empty-title { font-family: 'Fraunces', serif; font-size: 22px; color: var(--text); }
    .empty-sub   { font-size: 14px; color: var(--text-2); line-height: 1.5; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── My Books ───────────────────────────────────── */
    .books-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 16px;
    }
    .my-book-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color .2s;
    }
    .my-book-card:hover { border-color: var(--border-2); }
    .my-book-cover {
      height: 130px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      text-align: center;
    }
    .my-book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    .my-book-cover-text {
      position: relative;
      z-index: 1;
    }
    .my-book-cover-text-title {
      font-family: 'Fraunces', serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .my-book-cover-text-author {
      font-size: 11px;
      color: rgba(255,255,255,.6);
      font-style: italic;
    }
    .my-book-info { padding: 10px 12px; }
    .my-book-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .my-book-author { font-size: 11px; color: var(--text-2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .my-book-actions { display: flex; gap: 6px; }
    .my-book-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      border: 1px solid var(--border);
      color: var(--text-2);
      background: var(--surface);
      transition: all .15s;
    }
    .my-book-btn:hover { border-color: var(--border-2); color: var(--text); }
    .my-book-btn-del { color: rgba(212,90,74,.7); border-color: rgba(212,90,74,.2); background: rgba(212,90,74,.06); }
    .my-book-btn-del:hover { color: var(--nope); border-color: rgba(212,90,74,.4); background: rgba(212,90,74,.12); }

    /* FAB */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      right: max(16px, calc(50% - 240px + 16px));
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #0D0906;
      font-size: 28px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(212,168,67,.4);
      transition: all .2s;
      z-index: 50;
    }
    .fab:hover { background: var(--gold-2); transform: scale(1.06) rotate(90deg); }
    .fab:active { transform: scale(.96) rotate(90deg); }

    /* ─── Matches ────────────────────────────────────── */
    .matches-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; }
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      transition: border-color .2s;
    }
    .match-card:hover { border-color: var(--border-2); }
    .match-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .match-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--gold);
      color: #0D0906;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .match-user-info { flex: 1; min-width: 0; }
    .match-username { font-size: 15px; font-weight: 600; color: var(--text); }
    .match-location { font-size: 12px; color: var(--text-2); }
    .match-badge { background: rgba(212,168,67,.12); border: 1px solid rgba(212,168,67,.25); padding: 3px 10px; border-radius: 20px; font-size: 11px; color: var(--gold); font-weight: 500; }
    .match-exchange {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .match-book { flex: 1; min-width: 0; }
    .match-book-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .match-book-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-book-author { font-size: 11px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .match-arrow { color: var(--gold); font-size: 18px; flex-shrink: 0; }
    .match-contact {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(212,168,67,.07);
      border: 1px solid rgba(212,168,67,.15);
      border-radius: 10px;
      font-size: 13px;
      color: var(--gold);
      text-decoration: none;
      transition: all .2s;
    }
    .match-contact:hover { background: rgba(212,168,67,.14); }

    /* ─── Profile ────────────────────────────────────── */
    .profile-wrap { padding: 0 16px 16px; }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 20px;
    }
    .profile-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--gold);
      color: #0D0906;
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-username { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--text); }
    .profile-email { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .profile-stats { display: flex; gap: 16px; margin-top: 8px; }
    .profile-stat { text-align: center; }
    .profile-stat-n { font-size: 18px; font-weight: 600; color: var(--gold); }
    .profile-stat-l { font-size: 11px; color: var(--text-2); }
    .form-section { margin-bottom: 20px; }
    .form-section-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .genres-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .genre-chip {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      transition: all .15s;
    }
    .genre-chip.selected { background: rgba(212,168,67,.12); border-color: rgba(212,168,67,.35); color: var(--gold); }
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-2);
      margin-top: 24px;
      transition: all .2s;
    }
    .logout-btn:hover { border-color: rgba(212,90,74,.4); color: var(--nope); background: rgba(212,90,74,.06); }

    /* ─── Bottom Navigation ──────────────────────────── */
    .bottom-nav {
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 4px;
      border-radius: 12px;
      color: var(--text-3);
      transition: color .2s;
      position: relative;
    }
    .nav-item.active { color: var(--gold); }
    .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item-label { font-size: 10px; font-weight: 500; }
    .nav-dot {
      position: absolute;
      top: 6px; right: calc(50% - 16px);
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    /* ─── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 8px 24px 36px;
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(30px);
      transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }

    /* ─── Match Modal ────────────────────────────────── */
    .match-modal {
      text-align: center;
      padding: 40px 24px 36px;
    }
    .match-modal-emoji { font-size: 70px; line-height: 1; margin-bottom: 16px; animation: matchPop .5s ease; }
    @keyframes matchPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
    .match-modal-title {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .match-modal-sub { font-size: 14px; color: var(--text-2); margin-bottom: 28px; line-height: 1.5; }
    .match-modal-books {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--r);
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .match-modal-book { flex: 1; }
    .match-modal-book-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
    .match-modal-book-title { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }
    .match-modal-book-author { font-size: 12px; color: var(--text-2); }

    /* ─── Toast ──────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: calc(100vw - 32px);
    }
    .toast {
      background: var(--card-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      white-space: nowrap;
      animation: toastIn .3s ease;
    }
    .toast.error   { border-color: rgba(212,90,74,.4);  color: #E8806E; }
    .toast.success { border-color: rgba(76,175,125,.4); color: #72C5A0; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

    /* ─── Color chips for add book form ─────────────── */
    .color-picker { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .color-swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
